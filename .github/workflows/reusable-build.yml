name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      environment:
        required: true
        default: "staging"
        type: string
    secrets:
      docker_token:
        required: true
    outputs:
      build_version:
        description: "Generated build version"
        value: ${{ jobs.build.outputs.build_version }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      build_version: ${{ steps.set_version.outputs.build_version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Build Info
        run: |
          echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"

      - name: Verify Docker Token
        run: |
          if [ -n "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "Docker token is set: true"
          else
            echo "Docker token is set: false"
          fi

      - name: Generate Build Version
        id: set_version
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION="v1.0-${SHORT_SHA}"
          echo "build_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
