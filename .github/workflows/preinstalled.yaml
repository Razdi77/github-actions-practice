name: Explore pre-installed tools

on:
  push:

jobs:
   check-tools:
     runs-on: ubuntu-latest

     steps:
       - name: Check installed tools
         run: |
           echo "Docker version"
           docker --version

           echo "python version"
           python3 --version

           echo "Node version"
           node --version

           echo "Git version"
           git --version

       
  
