name: Artifact Sharing Between Jobs

on:
  push:

jobs:
  job1:
    name: Generate & Upload Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Create File
        run: |
          mkdir -p output
          echo "Hello from Job 1" > output/message.txt
          echo "Artifact passing between jobs works!" >> output/message.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-artifact
          path: output/message.txt

  job2:
    name: Download & Use Artifact
    runs-on: ubuntu-latest
    needs: job1  

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-artifact

      - name: Print File Content
        run: |
          echo "Reading file from Job 1:"
          cat message.txt
