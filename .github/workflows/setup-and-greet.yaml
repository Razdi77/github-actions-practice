name: "Setup and Greet"
description: "A composite action to greet and print system info"

inputs:
  name:
    description: "Name of the person"
    required: true
  language:
    description: "Language for greeting"
    required: false
    default: "en"

outputs:
  greeted:
    description: "Indicates greeting was successful"
    value: ${{ steps.set-output.outputs.greeted }}

runs:
  using: "composite"
  steps:
    - name: Print Greeting
      shell: bash
      run: |
        if [ "${{ inputs.language }}" = "en" ]; then
          echo "Hello, ${{ inputs.name }}!"
        elif [ "${{ inputs.language }}" = "es" ]; then
          echo "Hola, ${{ inputs.name }}!"
        elif [ "${{ inputs.language }}" = "fr" ]; then
          echo "Bonjour, ${{ inputs.name }}!"
        else
          echo "Hello, ${{ inputs.name }}!"
        fi

    - name: Print System Info
      shell: bash
      run: |
        echo "Date: $(date)"
        echo "Runner OS: $RUNNER_OS"

    - name: Set Output
      id: set-output
      shell: bash
      run: |
        echo "greeted=true" >> $GITHUB_OUTPUT
