name: Github hosted runners demo

on:
  push:

jobs:
   ubuntu-job:
     runs-on: ubuntu-latest
     steps:
       - name: Print system info
         run: |
           echo"OS:ubuntu"
           echo"Hostname: $(hostname)"
           echo"User: $(whoami)"

    windows-job:
    runs-on: windows-latest
    steps:
      - name: Print system info
        run: |
           echo OS: windows
           echo Hostname: %COMPUTERNAME% 
           echo User: %USERNAME% 

    MAC-OS-job:
    runs-on: macos-latest
    steps:
      - name: Print system info
        run: |
           echo "OS: macos"
           echo "Hostname: $(hostname)" 
           echo "User: $(whoami)"       

           
